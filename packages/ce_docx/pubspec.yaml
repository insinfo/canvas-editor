name: ce_docx
description: >-
  WordprocessingML tipado em Dart puro: reader + writer + preservação
  (passthrough) para round-trip DOCX sem corrupção.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

# G7: apenas packages irmãos puros por path (nenhuma dependência de pub).
dependencies:
  ce_opc:
    path: ../ce_opc
  ce_xml:
    path: ../ce_xml
  ce_zip:
    path: ../ce_zip

dev_dependencies:
  lints: ^5.1.1
  test: ^1.26.3
