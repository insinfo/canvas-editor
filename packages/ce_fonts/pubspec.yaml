name: ce_fonts
description: >-
  Parser TTF + métricas (hmtx/kern/cmap) + subsetting em Dart puro.
  Base: jsPDF port (ttffont.dart) + pdfbox_dart (ttf_subsetter.dart).
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

# G7: zero dependências de pub no runtime (apenas dart: core).
dev_dependencies:
  lints: ^5.1.1
  test: ^1.26.3
