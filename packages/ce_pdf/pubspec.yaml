name: ce_pdf
description: >-
  Gerador PDF em Dart puro (documento, páginas, content streams, zlib,
  PNG/JPEG) + PdfRenderContext. Núcleo adaptado do port Dart do jsPDF.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

# G7: apenas packages irmãos puros por path (nenhuma dependência de pub).
dependencies:
  ce_fonts:
    path: ../ce_fonts

dev_dependencies:
  lints: ^5.1.1
  test: ^1.26.3
